<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>نبض | منصة الذهب</title>
    
    <!-- كود تنظيف الكاش لضمان تحديث الموقع -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for(let registration of registrations) { registration.unregister(); }
            });
        }
    </script>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { margin: 0; background: #0A0D14; color: #fff; font-family: sans-serif; }
        .container { padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .settings-btn { background: none; border: 1px solid #2A3646; padding: 8px; border-radius: 8px; cursor: pointer; color: white; }
        #tv_chart_container { height: 350px; border: 1px solid #2A3646; border-radius: 12px; overflow: hidden; }
        .btn-update { width: 100%; padding: 15px; background: #F0B90B; border: none; border-radius: 12px; margin-top: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>نبض 📈</h1>
        <button class="settings-btn" onclick="alert('فتح الإعدادات...')">⚙️</button>
    </div>

    <div id="tv_chart_container"></div>
    <button class="btn-update" onclick="location.reload()">تحديث البيانات</button>
</div>

<script>
    // تهيئة الرسم البياني
    new TradingView.widget({
        "container_id": "tv_chart_container",
        "autosize": true,
        "symbol": "OANDA:XAUUSD",
        "interval": "60",
        "theme": "dark",
        "style": "1",
        "locale": "ar"
    });
</script>

</body>
</html>
